<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- solocrew: CyberOctopus
       Doc Ock meets AI. Mechanical octopus head with tech tentacles.
       Each arm is a segmented robotic appendage with a glowing tip.
       Red + black. Hi-fi. Techy. -->

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#080808" />

  <!-- Subtle grid pattern for tech feel -->
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#DC2626" stroke-width="0.3" opacity="0.06" />
    </pattern>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#grid)" />

  <!-- === MECHANICAL TENTACLES === -->

  <!-- Tentacle 1 — top-left, reaching up -->
  <path d="M 220 250 L 180 210 L 150 170 L 120 120 L 95 85" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 220 250 L 180 210 L 150 170 L 120 120 L 95 85" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <!-- Joints -->
  <circle cx="180" cy="210" r="6" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="150" cy="170" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="120" cy="120" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: terminal icon -->
  <rect x="79" y="69" width="32" height="32" rx="6" fill="#DC2626" opacity="0.9" />
  <text x="95" y="91" text-anchor="middle" font-family="monospace" font-size="16" fill="#080808" font-weight="800">&gt;_</text>

  <!-- Tentacle 2 — top-right -->
  <path d="M 292 250 L 332 210 L 362 170 L 392 120 L 417 85" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 292 250 L 332 210 L 362 170 L 392 120 L 417 85" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <circle cx="332" cy="210" r="6" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="362" cy="170" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="392" cy="120" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: code icon -->
  <rect x="401" y="69" width="32" height="32" rx="6" fill="#DC2626" opacity="0.9" />
  <text x="417" y="91" text-anchor="middle" font-family="monospace" font-size="16" fill="#080808" font-weight="800">{}</text>

  <!-- Tentacle 3 — left -->
  <path d="M 210 270 L 160 275 L 110 280 L 65 278" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 210 270 L 160 275 L 110 280 L 65 278" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <circle cx="160" cy="275" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="110" cy="280" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: search/research -->
  <circle cx="52" cy="278" r="16" fill="#DC2626" opacity="0.9" />
  <circle cx="49" cy="275" r="7" fill="none" stroke="#080808" stroke-width="2.5" />
  <line x1="54" y1="280" x2="62" y2="288" stroke="#080808" stroke-width="2.5" stroke-linecap="round" />

  <!-- Tentacle 4 — right -->
  <path d="M 302 270 L 352 275 L 402 280 L 447 278" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 302 270 L 352 275 L 402 280 L 447 278" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <circle cx="352" cy="275" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="402" cy="280" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: deploy/rocket -->
  <circle cx="460" cy="278" r="16" fill="#DC2626" opacity="0.9" />
  <polygon points="460,265 454,282 460,278 466,282" fill="#080808" />
  <rect x="455" y="280" width="10" height="6" rx="1" fill="#080808" />

  <!-- Tentacle 5 — bottom-left -->
  <path d="M 225 300 L 190 340 L 155 380 L 125 415" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 225 300 L 190 340 L 155 380 L 125 415" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <circle cx="190" cy="340" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="155" cy="380" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: write/pen -->
  <circle cx="112" cy="428" r="16" fill="#DC2626" opacity="0.9" />
  <line x1="105" y1="435" x2="119" y2="421" stroke="#080808" stroke-width="3" stroke-linecap="round" />
  <circle cx="105" cy="435" r="2" fill="#080808" />

  <!-- Tentacle 6 — bottom-right -->
  <path d="M 287 300 L 322 340 L 357 380 L 387 415" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 287 300 L 322 340 L 357 380 L 387 415" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <circle cx="322" cy="340" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="357" cy="380" r="5" fill="#1A1A1A" stroke="#DC2626" stroke-width="1.5" />
  <!-- Tip: chart/analytics -->
  <circle cx="400" cy="428" r="16" fill="#DC2626" opacity="0.9" />
  <polyline points="391,435 396,428 401,432 408,420" fill="none" stroke="#080808" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- === HEAD — Cybernetic Octopus Core === -->

  <!-- Head base shape — rounded, helmet-like -->
  <ellipse cx="256" cy="262" r="62" ry="55" fill="#141414" />
  <ellipse cx="256" cy="262" r="62" ry="55" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.5" />

  <!-- Dome / forehead plate -->
  <ellipse cx="256" cy="242" r="48" ry="30" fill="#1A1A1A" />
  <ellipse cx="256" cy="238" r="38" ry="18" fill="#1E1E1E" />

  <!-- Central red accent line on dome -->
  <line x1="256" y1="215" x2="256" y2="250" stroke="#DC2626" stroke-width="2" opacity="0.6" />

  <!-- Visor / Eye band -->
  <rect x="200" y="255" width="112" height="28" rx="14" fill="#0A0A0A" stroke="#DC2626" stroke-width="1.5" />

  <!-- Eye — single wide visor with scanning light -->
  <rect x="210" y="260" width="92" height="18" rx="9" fill="#DC2626" opacity="0.9" />
  <!-- Scanning effect -->
  <rect x="210" y="260" width="30" height="18" rx="9" fill="#EF4444" opacity="0.6" />
  <!-- Eye reflection -->
  <rect x="215" y="263" width="18" height="4" rx="2" fill="#FCA5A5" opacity="0.5" />

  <!-- Visor glow -->
  <rect x="200" y="255" width="112" height="28" rx="14" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.15">
  </rect>
  <ellipse cx="256" cy="269" rx="65" ry="22" fill="#DC2626" opacity="0.04" />

  <!-- Chin plate -->
  <path d="M 220 295 Q 256 315 292 295" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.3" />

  <!-- Side vents -->
  <rect x="192" y="270" width="3" height="12" rx="1" fill="#DC2626" opacity="0.4" />
  <rect x="317" y="270" width="3" height="12" rx="1" fill="#DC2626" opacity="0.4" />
</svg>
